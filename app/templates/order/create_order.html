{% extends "base.html" %}

{% block title %}Create Order{% endblock %}
{% block page_title %}Create New Order{% endblock %}

{% block content %}
    <div class="card p-4">
        <form id="orderForm">
            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">
                        Order Date <span class="text-danger">*</span>
                    </label>
                    <input type="datetime-local" class="form-control" id="orderDate" required>
                </div>
            
                <div class="col-md-6">
                    <label class="form-label fw-bold">
                        Customer <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <select class="form-select" id="customerId" required>
                            <option value="">Loading customers...</option>
                        </select>
                        <span class="spinner-small ms-2 mt-2" id="customerLoading"></span>
                    </div>
                </div>
            </div>

            <!-- Delivery Details -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Delivery Type</label>
                    <select class="form-select" id="deliveryType">
                        <option value="pickup">Pickup</option>
                        <option value="delivery">Delivery</option>
                    </select>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Delivery Price</label>
                    <input type="number" class="form-control" id="deliveryPrice" 
                        value="0" min="0" step="1" onchange="calculateTotal()">
                </div>
            </div>

            <!-- Order Items -->
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <label class="form-label fw-bold mb-0">
                        Order Items <span class="text-danger">*</span>
                    </label>
                </div>
            
                <div id="orderItems"></div>

                <button type="button" class="btn btn-sm btn-primary" onclick="addOrderItem()">
                    <i class="bi bi-plus-circle"></i> Add Item
                </button>
            
                <div id="itemsLoading" class="text-center py-3">
                    <div class="spinner-small d-inline-block"></div>
                    <small class="text-muted ms-2">Loading products...</small>
                </div>
            </div>

            <!-- Total Summary -->
            <div class="card bg-light mb-4">
                <div class="card-body">
                    <div class="row mb-2">
                        <div class="col-6"><strong>Subtotal:</strong></div>
                        <div class="col-6 text-end" id="subtotalDisplay">Rp 0</div>
                    </div>
                    <div class="row mb-2">
                        <div class="col-6"><strong>Delivery:</strong></div>
                        <div class="col-6 text-end" id="deliveryDisplay">Rp 0</div>
                    </div>
                    <hr>
                        <div class="row">
                        <div class="col-6"><h5 class="mb-0">Total:</h5></div>
                        <div class="col-6 text-end"><h5 class="mb-0 text-primary" id="totalDisplay">Rp 0</h5></div>
                    </div>
                </div>
            </div>

            <!-- Order Status -->
            <div class="mb-4">
                <label class="form-label fw-bold">Order Status</label>
                <select class="form-select" id="orderStatus">
                    <option value="pending">Pending</option>
                    <option value="paid">Paid</option>
                    <option value="picked up">Picked Up</option>
                    <option value="delivered">Delivered</option>
                </select>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="bi bi-check-circle"></i> Create Order
                </button>
                <a href="{{ url_for('web.orders.orders') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </form>
    </div>
{% endblock %}

{% block extra_js %}
    <script>
        let products = [];
        let itemCounter = 0;

        function formatRupiah(amount) {
            return new Intl.NumberFormat('id-ID').format(amount);
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type === 'success' ? 'success' : 'danger'} position-fixed top-0 end-0 m-3`;
            toast.style.zIndex = '9999';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers');
                const customers = await response.json();
                
                const select = document.getElementById('customerId');
                select.innerHTML = '<option value="">Select a customer...</option>' +
                customers.map(c => `
                    <option value="${c.id}">
                    ${c.name}${c.phone ? ' - ' + c.phone : ''}
                    </option>
                `).join('');
                
                document.getElementById('customerLoading').classList.add('hidden');
                
            } catch (error) {
                console.error('Error loading customers:', error);
                showToast('Failed to load customers', 'error');
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                products = await response.json();
                
                document.getElementById('itemsLoading').classList.add('hidden');
                addOrderItem();
                
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Failed to load products', 'error');
            }
        }

        function addOrderItem() {
            itemCounter++;
            const itemHtml = `
            <div class="card mb-3" id="item-${itemCounter}">
                <div class="card-body">
                    <div class="row g-3">

                        <!-- PRODUCT -->
                        <div class="col-md-2">
                            <label class="form-label small">Product</label>
                            <select class="form-select form-select-sm"
                                onchange="updateVariants(${itemCounter})"
                                id="product-${itemCounter}">
                                <option value="">Select product...</option>
                                ${products.map(p => `
                                    <option value="${p.id}">
                                        ${p.name}
                                    </option>
                                `).join('')}
                            </select>
                        </div>

                        <!-- VARIANT -->
                        <div class="col-md-2">
                            <label class="form-label small">Variant</label>
                            <select class="form-select form-select-sm"
                                onchange="updateVariantPrices(${itemCounter})"
                                id="variant-${itemCounter}">
                                <option value="">Select variant...</option>
                            </select>
                        </div>

                        <!-- QTY -->
                        <div class="col-md-1">
                            <label class="form-label small">Qty</label>
                            <input type="number" class="form-control form-control-sm"
                                id="qty-${itemCounter}"
                                min="0.01" step="0.01" value="1"
                                oninput="updateItemSubtotal(${itemCounter})">
                        </div>

                        <!-- BUY -->
                        <div class="col-md-2">
                            <label class="form-label small">Buy</label>
                            <input type="number" class="form-control form-control-sm"
                                id="buy-${itemCounter}" readonly>
                        </div>

                        <!-- SELL -->
                        <div class="col-md-2">
                            <label class="form-label small">Sell</label>
                            <input type="number" class="form-control form-control-sm"
                                id="sell-${itemCounter}"
                                oninput="updateItemSubtotal(${itemCounter})">
                        </div>

                        <div class="col-md-1">
                            <label class="form-label small">Subtotal</label>
                            <input type="text" class="form-control form-control-sm"
                                id="subtotal-${itemCounter}" readonly>
                        </div>

                        <div class="col-md-12 text-end">
                            <button class="btn btn-sm btn-danger"
                                onclick="removeOrderItem(${itemCounter})">
                                Remove
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            `;

            document.getElementById('orderItems').insertAdjacentHTML('beforeend', itemHtml);
        }

        function updateVariants(itemId) {
            const productId = document.getElementById(`product-${itemId}`).value;
            const variantSelect = document.getElementById(`variant-${itemId}`);

            variantSelect.innerHTML = '<option value="">Select variant...</option>';

            const product = products.find(p => p.id == productId);

            if (!product) return;

            product.product_variants.forEach(v => {

                const option = document.createElement("option");

                option.value = v.id;
                option.textContent =
                    `${v.name} (Stock: ${v.stock} ${v.unit})`;

                option.dataset.buy = v.buy_price;
                option.dataset.sell = v.sell_price;
                option.dataset.stock = v.stock;

                variantSelect.appendChild(option);

            });

        }

        function updateVariantPrices(itemId) {
            const variantSelect =
                document.getElementById(`variant-${itemId}`);

            const selected =
                variantSelect.options[variantSelect.selectedIndex];

            if (!selected.dataset.sell) return;

            document.getElementById(`buy-${itemId}`).value =
                selected.dataset.buy;

            document.getElementById(`sell-${itemId}`).value =
                selected.dataset.sell;

            updateItemSubtotal(itemId);

        }

        function updateItemPrices(itemId) {
            const item = document.querySelector(`#item-${itemId}`);
            const select = item.querySelector('.product-select');
            const option = select.options[select.selectedIndex];
            
            if (option.value) {
                const buyPrice = option.getAttribute('data-buy-price');
                const sellPrice = option.getAttribute('data-sell-price');
                
                item.querySelector('.buy-price').value = buyPrice;
                item.querySelector('.sell-price').value = sellPrice;
                
                updateItemSubtotal(itemId);
            }
        }

        function updateItemSubtotal(itemId) {
            const item = document.querySelector(`#item-${itemId}`);
            const quantity = parseFloat(item.querySelector(`#qty-${itemId}`).value) || 0;
            const sellPrice = parseFloat(item.querySelector(`#sell-${itemId}`).value) || 0;
            const subtotal = quantity * sellPrice;
            
            item.querySelector(`#subtotal-${itemId}`).value = 'Rp ' + formatRupiah(subtotal);
            calculateTotal();
        }

        function removeOrderItem(itemId) {
            const items = document.querySelectorAll('#orderItems .card');
            if (items.length > 1) {
                document.getElementById(`item-${itemId}`).remove();
                calculateTotal();
            } else {
                showToast('At least one item is required', 'error');
            }
        }

        function calculateTotal() {
            let subtotal = 0;
            
            document.querySelectorAll('#orderItems .card').forEach(item => {
                const itemId = item.id.split('-')[1];

                const quantity = parseFloat(item.querySelector(`#qty-${itemId}`).value) || 0;
                const sellPrice = parseFloat(item.querySelector(`#sell-${itemId}`).value) || 0;
                subtotal += quantity * sellPrice;
            });
            
            const deliveryPrice = parseFloat(document.getElementById('deliveryPrice').value) || 0;
            const total = subtotal + deliveryPrice;
            
            document.getElementById('subtotalDisplay').textContent = 'Rp ' + formatRupiah(subtotal);
            document.getElementById('deliveryDisplay').textContent = 'Rp ' + formatRupiah(deliveryPrice);
            document.getElementById('totalDisplay').textContent = 'Rp ' + formatRupiah(total);
        }

        // Form submission
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const items = [];
            const orderItems = document.querySelectorAll('#orderItems .card');

            let valid = true;

            orderItems.forEach(item => {

                const productId = item.querySelector('[id^="product-"]').value;
                const variantId = item.querySelector('[id^="variant-"]').value;

                if (!productId || !variantId) {
                    valid = false;
                    return;
                }

                const quantity =
                    parseFloat(item.querySelector('[id^="qty-"]').value) || 0;

                const buyPrice =
                    parseFloat(item.querySelector('[id^="buy-"]').value) || 0;

                const sellPrice =
                    parseFloat(item.querySelector('[id^="sell-"]').value) || 0;

                items.push({
                    product_id: parseInt(productId),
                    product_variant_id: parseInt(variantId),
                    quantity: quantity,
                    buy_price: buyPrice,
                    sell_price: sellPrice
                });

            });

            if (!valid) {
                showToast('Please select product and variant', 'error');
                return;
            }

            const orderData = {
                order_date: document.getElementById('orderDate').value,
                customer_id: parseInt(document.getElementById('customerId').value),
                delivery_type: document.getElementById('deliveryType').value,
                delivery_price: parseFloat(document.getElementById('deliveryPrice').value) || 0,
                status: document.getElementById('orderStatus').value,
                items: items
            };
            console.log(orderData);
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-small"></span> Creating...';

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                console.log(response);
                console.log(data);

                if (response.ok && data.success) {
                    showToast('Order created successfully!', 'success');

                    setTimeout(() => {
                        window.location.href = '/my-orders';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Failed to create order');
                }

            } catch (error) {

                showToast(error.message, 'error');

                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Create Order';

            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('orderDate').value = now.toISOString().slice(0, 16);

            loadCustomers();
            loadProducts();
        });
    </script>
{% endblock %}
