{% extends "base.html" %}

{% block title %}Orders{% endblock %}
{% block page_title %}Orders{% endblock %}

{% block content %}
    <style>
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            width: 700px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>

    <div class="card p-3 mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="Search customer name...">
            </div>
            <div class="col-md-3">
                <select id="statusFilter" class="form-select">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="paid">Paid</option>
                    <option value="delivered">Delivered</option>
                    <option value="picked up">Picked Up</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="perPageSelect" class="form-select">
                    <option value="10">10 per page</option>
                    <option value="25" selected>25 per page</option>
                    <option value="50">50 per page</option>
                    <option value="100">100 per page</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="loadOrders()">
                    <i class="bi bi-search"></i> Search
                </button>
            </div>
        </div>
    </div>

    <div id="ordersLoading">
        <div class="skeleton skeleton-lg mb-2"></div>
    </div>

    <!-- Orders Table -->
    <div id="ordersList" class="hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th width="10%"></th>
                        <th width="15%">Date</th>
                        <th width="15%">Customer</th>
                        <th width="15%">Total</th>
                        <th width="15%">Status</th>
                        <th width="15%">Action</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="emptyState" class="hidden text-center text-muted">
        No orders found
    </div>

    <!-- Pagination -->
    <nav id="paginationNav" class="hidden mt-4" aria-label="Orders pagination">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <small class="text-muted" id="paginationInfo"></small>
            </div>
            <ul class="pagination mb-0" id="paginationList"></ul>
        </div>
    </nav>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-5">
        <i class="bi bi-inbox" style="font-size: 3rem; color: #ccc;"></i>
        <p class="text-muted mt-3">No orders found</p>
    </div>

    <div id="orderDetailModal" class="modal-overlay">
    <div class="modal-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Order Detail</h5>
            <button class="btn btn-sm btn-outline-secondary" onclick="closeOrderDetail()">✕</button>
        </div>

        <div id="orderDetailContent"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
    <script>
        let currentPage = 1;
        let totalCount = 0;
        let ordersCache = {};

        function formatRupiah(amount) {
            return new Intl.NumberFormat('id-ID').format(amount);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            if (isNaN(date)) return '-';

            const day = String(date.getDate()).padStart(2, '0');     // 06
            const month = date.toLocaleString('en-GB', { month: 'short' }); // Mar
            const year = String(date.getFullYear()).slice(-2);       // 26
            const hours = String(date.getHours()).padStart(2, '0');  // 00
            const minutes = String(date.getMinutes()).padStart(2, '0'); // 40

            return `${day} ${month} ${year} ${hours}:${minutes}`;
        }

        function getStatusBadge(status) {
            const badges = {
                'pending': 'bg-warning',
                'paid': 'bg-info',
                'delivered': 'bg-success',
                'cancelled': 'bg-danger'
            };
            return badges[status] || 'bg-secondary';
        }

        function getStatusText(status) {
            const texts = {
                'pending': 'Pending',
                'paid': 'Paid',
                'delivered': 'Delivered',
                'cancelled': 'Cancelled'
            };
            return texts[status] || status;
        }

        async function updateOrderStatus(orderId, newStatus, selectElement) {
            const originalStatus = selectElement.value;

            try {
                selectElement.disabled = true;

                const response = await fetch(`/api/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) throw new Error('Failed to update status');

                const card = selectElement.closest('.card');
                const badge = card.querySelector('.order-status-badge');
                badge.className = `badge ${getStatusBadge(newStatus)} order-status-badge`;
                badge.textContent = getStatusText(newStatus);

                showToast('Status updated successfully', 'success');

            } catch (error) {
                console.error('Error updating status:', error);
                selectElement.value = originalStatus;
                showToast('Failed to update status', 'error');
            } finally {
                selectElement.disabled = false;
            }
        }

        async function updateItemPrepared(itemId, isPrepared, checkboxElement) {
            const originalValue = checkboxElement.checked;

            try {
                checkboxElement.disabled = true;

                const response = await fetch(`/api/order-items/${itemId}/prepared`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ is_prepared: isPrepared })
                });

                if (!response.ok) throw new Error('Failed to update item status');

                showToast('Item status updated', 'success');

            } catch (error) {
                console.error('Error updating item:', error);
                checkboxElement.checked = originalValue;
                showToast('Failed to update item status', 'error');
            } finally {
                checkboxElement.disabled = false;
            }
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type === 'success' ? 'success' : 'danger'} position-fixed top-0 end-0 m-3`;
            toast.style.zIndex = '9999';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        function renderPagination(page, perPage, total) {
            const totalPages = Math.ceil(total / perPage);
            const paginationNav = document.getElementById('paginationNav');
            const paginationList = document.getElementById('paginationList');
            const paginationInfo = document.getElementById('paginationInfo');

            if (totalPages <= 1) {
                paginationNav.classList.add('hidden');
                return;
            }

            paginationNav.classList.remove('hidden');

            const start = (page - 1) * perPage + 1;
            const end = Math.min(page * perPage, total);
            paginationInfo.textContent = `Showing ${start}-${end} of ${total} orders`;

            let html = '';

            html += `
                <li class="page-item ${page === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${page - 1}); return false;">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
            `;

            const maxVisible = 5;
            let startPage = Math.max(1, page - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            if (startPage > 1) {
                html += `
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="changePage(1); return false;">1</a>
                    </li>
                `;
                if (startPage > 2) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `
                    <li class="page-item ${i === page ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
                    </li>
                `;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
                html += `
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="changePage(${totalPages}); return false;">${totalPages}</a>
                    </li>
                `;
            }

            html += `
                <li class="page-item ${page === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${page + 1}); return false;">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            `;
            
            paginationList.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            loadOrders();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openOrderDetail(orderId) {
            const order = ordersCache[orderId];
            if (!order) return;

            const modal = document.getElementById('orderDetailModal');
            const content = document.getElementById('orderDetailContent');

            content.innerHTML = `
                <div class="mb-3">
                    <strong>Order #${order.id}</strong><br>
                    <small class="text-muted">${formatDate(order.order_date)}</small>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>Customer</strong><br>
                        ${order.customers.name}<br>
                        <small class="text-muted">${order.customers.phone || '-'} </small>
                    </div>
                    <div class="col-md-6">
                        <strong>Address</strong><br>
                        <small class="text-muted">${order.customers.address || '-'}</small>
                    </div>
                </div>

                <div class="table-responsive mb-3">
                    <table class="table table-sm">
                        <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th class="text-center">Qty</th>
                                <th class="text-end">Price</th>
                                <th class="text-end">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${order.order_items.map(item => `
                                <tr>
                                    <td>${item.products.name}</td>
                                    <td class="text-center">${item.quantity} ${item.products.unit}</td>
                                    <td class="text-end">Rp ${formatRupiah(item.sell_price)}</td>
                                    <td class="text-end">
                                        Rp ${formatRupiah(item.quantity * item.sell_price)}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                        <tfoot class="table-light">
                            ${order.delivery_price > 0 ? `
                                <tr>
                                    <td colspan="3" class="text-end">Delivery Fee</td>
                                    <td class="text-end">Rp ${formatRupiah(order.delivery_price)}</td>
                                </tr>
                            ` : ''}
                            <tr>
                                <td colspan="3" class="text-end"><strong>Total</strong></td>
                                <td class="text-end">
                                    <strong class="text-primary">
                                        Rp ${formatRupiah(order.total_amount + order.delivery_price)}
                                    </strong>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div>
                    <span class="badge ${getStatusBadge(order.status)}">
                        ${getStatusText(order.status)}
                    </span>
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeOrderDetail() {
            const modal = document.getElementById('orderDetailModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        async function loadOrders() {
            const loadingEl = document.getElementById('ordersLoading');
            const listEl = document.getElementById('ordersList');
            const emptyEl = document.getElementById('emptyState');
            const tbody = document.getElementById('ordersTableBody');
            const paginationNav = document.getElementById('paginationNav');

            try {
                loadingEl.classList.remove('hidden');
                listEl.classList.add('hidden');
                emptyEl.classList.add('hidden');
                paginationNav.classList.add('hidden');

                const status = document.getElementById('statusFilter').value;
                const search = document.getElementById('searchInput').value;
                const perPage = parseInt(document.getElementById('perPageSelect').value);

                const params = new URLSearchParams();
                if (status !== 'all') params.append('status', status);
                if (search) params.append('search', search);
                params.append('page', currentPage);
                params.append('per_page', perPage);

                const response = await fetch(`/api/orders?${params}`);
                const data = await response.json();

                loadingEl.classList.add('hidden');

                if (!data.orders.length) {
                    emptyEl.classList.remove('hidden');
                    return;
                }

                totalCount = data.total;

                tbody.innerHTML = data.orders.map(order => {
                    ordersCache[order.id] = order;

                    return `
                        <tr id="order-${order.id}">
                            <td><img src="/static/icons/${order.delivery_type === 'delivery' ? 'courier.png' : 'box.png'}"
                                width="16" height="16"
                                alt="${order.delivery_type}"> ${order.id}
                            </td>
                            <td>${formatDate(order.order_date)}</td>
                            <td>
                                <div><strong>${order.customers.name}</strong></div>
                                ${order.customers.phone ? `<small class="text-muted">${order.customers.phone}</small>` : ''}
                            </td>
                            <td>
                                <strong>
                                    Rp ${formatRupiah(order.total_amount + order.delivery_price)}
                                </strong>
                            </td>
                            <td>
                                <select class="form-select form-select-sm"
                                    onchange="updateOrderStatus(${order.id}, this.value, this)"
                                    ${order.status === 'cancelled' || order.status === 'delivered' ? 'disabled' : ''}>

                                    <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                    <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>Paid</option>
                                    <option value="picked up" ${order.status === 'picked up' ? 'selected' : ''}>Picked Up</option>
                                    <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                    <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-primary"
                                    onclick="openOrderDetail(${order.id})">
                                    Detail
                                </button>

                                ${order.status === 'pending' ? `
                                    <a href="/orders/edit?id=${order.id}" 
                                    class="btn btn-sm btn-warning ms-1">
                                        Edit
                                    </a>
                                ` : ''}
                            </td>
                        </tr>
                    `;
                }).join('');

                listEl.classList.remove('hidden');
                paginationNav.classList.remove('hidden');

                renderPagination(currentPage, perPage, totalCount);

            } catch (error) {
                console.error('Error loading orders:', error);
                loadingEl.classList.add('hidden');
                showToast('Failed to load orders', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadOrders);

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                currentPage = 1;
                loadOrders();
            }
        });

        document.getElementById('statusFilter').addEventListener('change', () => {
            currentPage = 1;
            loadOrders();
        });

        document.getElementById('perPageSelect').addEventListener('change', () => {
            currentPage = 1;
            loadOrders();
        });
    </script>
{% endblock %}
